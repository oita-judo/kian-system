<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大分県柔道連盟　文書起案システム ログイン</title>

  <style>
    body{
      margin:0;
      font-family:sans-serif;
      background:#f5f6f8;
      display:flex;
      min-height:100vh;
      align-items:center;
      justify-content:center;
    }

    .card{
      width:min(420px, 92vw);
      background:#fff;
      border-radius:16px;
      box-shadow:0 8px 24px rgba(0,0,0,.08);
      padding:28px;
      box-sizing:border-box;
      text-align:center;
    }

    h1{
      font-size:24px;
      margin:0 0 10px;
    }

    p{
      color:#555;
      margin:0 0 18px;
    }

    input{
      width:100%;
      box-sizing:border-box;
      padding:12px;
      font-size:18px;
      margin-bottom:12px;
    }

    button{
      width:100%;
      padding:12px;
      font-size:16px;
      border:none;
      border-radius:10px;
      background:#1f6feb;
      color:#fff;
      cursor:pointer;
    }

    button:disabled{
      background:#999;
      cursor:not-allowed;
    }

    .msg{
      margin-top:12px;
      min-height:1.5em;
      color:#c62828;
      font-size:14px;
    }

    .note{
      margin-top:14px;
      font-size:12px;
      color:#777;
    }

    /* ===== ローディング ===== */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .loading-overlay.hidden {
      display: none;
    }

    .loading-box {
      background: #fff;
      border-radius: 14px;
      padding: 24px 32px;
      box-shadow: 0 8px 24px rgba(0,0,0,.15);
      text-align: center;
      font-weight: bold;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #ddd;
      border-top: 4px solid #1f6feb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <!-- ローディング -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-box">
      <div class="spinner"></div>
      <div id="loadingText">処理中です...</div>
    </div>
  </div>

  <div class="card">
    <h1>大分県柔道連盟　文書起案システム</h1>
    <p>PINを入力してください</p>

    <input id="pin" type="password" inputmode="numeric" maxlength="4" placeholder="4桁PIN">
    <button id="loginBtn" type="button">ログイン</button>
    <div id="msg" class="msg"></div>

    <div class="note">起案者・承認者・保管担当ごとに遷移先が変わります。</div>
  </div>

  <script src="auth.js"></script>

  <script>
    function showLoading(text = "処理中です...") {
      const overlay = document.getElementById("loadingOverlay");
      const label = document.getElementById("loadingText");
      if (label) label.textContent = text;
      if (overlay) overlay.classList.remove("hidden");
    }

    function hideLoading() {
      const overlay = document.getElementById("loadingOverlay");
      if (overlay) overlay.classList.add("hidden");
    }

    async function doLogin() {
      const pin = document.getElementById("pin").value.trim();
      const msg = document.getElementById("msg");
      const btn = document.getElementById("loginBtn");

      msg.textContent = "";

      if (!/^\d{4}$/.test(pin)) {
        msg.textContent = "PINは4桁の数字で入力してください。";
        return;
      }

      try {
        showLoading("ログイン確認中です...");
        btn.disabled = true;

        const user = await authLogin(pin);

        if (user.role === "drafter") {
          location.href = "./drafter/index.html";
          return;
        }
        if (user.role === "approverA" || user.role === "approverB") {
          location.href = "./approver/index.html";
          return;
        }
        if (user.role === "admin") {
          location.href = "./archive/index.html";
          return;
        }

        msg.textContent = "遷移先が設定されていません。";

      } catch (err) {
        msg.textContent = err.message || "ログインに失敗しました。";
      } finally {
        hideLoading();
        btn.disabled = false;
      }
    }

    document.getElementById("loginBtn").addEventListener("click", doLogin);

    document.getElementById("pin").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });

    // すでにログイン済みなら自動遷移
    const auth = getAuth();
    if (auth?.role === "drafter") location.href = "./drafter/index.html";
    if (auth?.role === "approverA" || auth?.role === "approverB") location.href = "./approver/index.html";
    if (auth?.role === "admin") location.href = "./archive/index.html";
  </script>

</body>
</html>
