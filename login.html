<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>文書起案システム ログイン</title>
</head>

<body>

<h2>文書起案システム</h2>

<input id="pin" type="password" placeholder="PIN">
<button onclick="login()">ログイン</button>

<script>

const USERS = {
 "1111": "index.html",
 "2222": "approve.html",
 "3333": "approve.html",
 "9999": "approved.html"
};

function login(){

 const pin = document.getElementById("pin").value;

 if(USERS[pin]){
   window.location.href = USERS[pin];
 }else{
   alert("PINが違います");
 }

}

</script>

</body>
</html>
