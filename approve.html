<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>承認ページ</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<div class="container">
  <h1>承認ページ</h1>

  <div class="approveTop">
    <div class="approveInfo">
      <div class="small">日付（自動）</div>
      <div id="today" class="today"></div>
    </div>

    <div class="approveInfo">
      <label>承認者名（必須）</label>
      <input id="approverName" type="text" placeholder="例：教頭 / 事務長 / 担当A" required>
    </div>

    <div class="approveInfo">
      <label>コメント（任意）</label>
      <input id="comment" type="text" placeholder="例：確認しました">
    </div>

    <div class="row">
      <button id="reloadBtn" type="button" class="secondary">最新に更新</button>
    </div>
  </div>

  <hr>

  <h2 class="h2">未承認（要承認）一覧</h2>
  <p class="help">※承認は2人分たまったら「承認済」になります（順番なし）</p>

  <div id="list" class="cards"></div>

  <p id="status" class="status"></p>
</div>

<script src="./approve.js"></script>
</body>
</html>
