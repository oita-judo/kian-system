<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>文書起案システム</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>文書起案システム</h1>

<label>区分</label>

<select id="type">
<option value="shishutsu">支出負担行為</option>
<option value="shuunyuu">収入行為</option>
<option value="ringi">稟議行為</option>
</select>


<!-- 支出負担行為 -->

<div id="form_shishutsu">

<div class="triple">

<div class="field">
<label>項</label>
<input id="s_kou">
</div>

<div class="field">
<label>目</label>
<input id="s_moku">
</div>

<div class="field">
<label>節</label>
<input id="s_setsu">
</div>

</div>
<label>件名 ★</label>
<input id="s_title" required>

<label>内容 ★</label>
<textarea id="s_content" required></textarea>

<label>支出金額 ★</label>
<input id="s_amount" type="number" required>

<label>支払先 ★</label>
<input id="s_payee" required>
  
<div class="field">
<label>支払方法</label>
<input id="s_method">
</div>

</div>

</div>


<!-- 収入行為 -->

<div id="form_shuunyuu" style="display:none">

<div class="triple">

<div class="field">
<label>項</label>
<input id="r_kou">
</div>

<div class="field">
<label>目</label>
<input id="r_moku">
</div>

<div class="field">
<label>節</label>
<input id="r_setsu">
</div>

</div>

  <label>件名 ★</label>
<input id="r_title" required>

<label>内容 ★</label>
<textarea id="r_content" required></textarea>

<label>収入金額 ★</label>
<input id="r_amount" required>

<label>納入者 ★</label>
<input id="r_payer" required>



<div class="field">
<label>納入方法</label>
<input id="r_method">
</div>

</div>

</div>


<!-- 稟議行為 -->

<div id="form_ringi" style="display:none">

<label>件名 ★</label>
<input id="g_title" required>

<label>内容 ★</label>
<textarea id="g_content" required></textarea>

<label>添付</label>
<input id="g_file" type="file">

</div>


<br>

<button id="sendBtn">送信</button>

<p id="status"></p>

</div>

<script src="script.js"></script>
</body>
</html>
