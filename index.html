<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>文書起案システム</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="card">
    <h1>文書起案システム</h1>

    <!-- 下書き番号（複数保存） -->
    <label>下書き番号</label>
    <input id="draftNo" type="text" placeholder="例：001">

    <div class="row">
      <button id="saveDraftBtn" type="button" class="secondary">番号で下書き保存</button></br><hr>
      <button id="loadDraftBtn" type="button" class="secondary">番号で下書き復元</button></br>
      <button id="deleteDraftBtn" type="button" class="secondary">番号の下書き削除</button>
    </div>

    <div class="row">
      <button id="listDraftBtn" type="button" class="secondary">下書き一覧</button>
    </div>

    <pre class="status" id="draftList"></pre>

    <hr style="margin:12px 0;border:0;border-top:1px solid #eee;">

    <!-- 起案入力 -->
   <!-- 区分 -->
<label for="kbn">区分</label>
<select id="kbn" name="kbn">
  <option value="ringi">稟議</option>
  <option value="shuccho">出張申請</option>
  <option value="bihin">備品購入</option>
</select>

<!-- ここから：区分別の入力ブロック -->
<div class="kbn-block" data-kbn="ringi">
  <label for="ringi_naiyou">内容（稟議）</label>
  <textarea id="ringi_naiyou" name="ringi_naiyou" rows="8"
    placeholder="【目的】&#10;【背景】&#10;【内容】&#10;【金額】円&#10;【期日】&#10;【備考】"></textarea>

  <label for="ringi_kingaku">金額（円）</label>
  <input id="ringi_kingaku" name="ringi_kingaku" inputmode="numeric" placeholder="例：30000">
  
  <label for="ringi_kigen">希望期日</label>
  <input id="ringi_kigen" name="ringi_kigen" type="date">
</div>

<div class="kbn-block" data-kbn="shuccho">
  <label for="shuccho_naiyou">内容（出張）</label>
  <textarea id="shuccho_naiyou" name="shuccho_naiyou" rows="8"
    placeholder="【行先】&#10;【日程】&#10;【目的】&#10;【参加者】&#10;【旅費見込】円&#10;【備考】"></textarea>

  <label for="shuccho_place">行先</label>
  <input id="shuccho_place" name="shuccho_place" placeholder="例：大分市">

  <label for="shuccho_from">出張開始</label>
  <input id="shuccho_from" name="shuccho_from" type="date">

  <label for="shuccho_to">出張終了</label>
  <input id="shuccho_to" name="shuccho_to" type="date">

  <label for="shuccho_cost">旅費見込（円）</label>
  <input id="shuccho_cost" name="shuccho_cost" inputmode="numeric" placeholder="例：12000">
</div>

<div class="kbn-block" data-kbn="bihin">
  <label for="bihin_naiyou">内容（備品購入）</label>
  <textarea id="bihin_naiyou" name="bihin_naiyou" rows="8"
    placeholder="【品名】&#10;【数量】&#10;【単価】円&#10;【合計】円&#10;【購入理由】&#10;【希望納期】&#10;【備考】"></textarea>

  <label for="bihin_name">品名</label>
  <input id="bihin_name" name="bihin_name" placeholder="例：プリンタ用トナー">

  <label for="bihin_qty">数量</label>
  <input id="bihin_qty" name="bihin_qty" inputmode="numeric" placeholder="例：2">

  <label for="bihin_unit">単価（円）</label>
  <input id="bihin_unit" name="bihin_unit" inputmode="numeric" placeholder="例：4500">

  <label for="bihin_deadline">希望納期</label>
  <input id="bihin_deadline" name="bihin_deadline" type="date">
</div>
<!-- ここまで：区分別ブロック -->
    <label>提出者</label>
    <input id="name" type="text" placeholder="例：〇〇（氏名）" />

    <div class="row">
      <button id="sendBtn" type="button">送信</button>
      <button id="clearBtn" type="button" class="secondary">クリア</button>
    </div>

    <p class="status" id="status"></p>
  </main>

  <script src="./script.js"></script>
</body>
</html>
