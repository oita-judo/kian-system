<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大分県柔道連盟 文書起案システム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="page-title">大分県柔道連盟　文書起案システム</div>

    <!-- 下書き操作 -->
    <div class="draft-toolbar">
      <input type="text" id="draftNo" class="draft-no" placeholder="下書き番号">
      <button type="button" class="btn btn-primary" id="saveDraftBtn">下書き保存</button>
      <button type="button" class="btn btn-secondary" id="listDraftBtn">下書き一覧</button>
    </div>

    <p class="draft-note">
      下書きはスプレッドシートに保存されます。添付ファイルは下書きには含まれません。
    </p>

    <!-- 件数カード -->
    <div class="status-summary-wrap">
      <div class="status-summary-card">
        <div class="status-summary-title">下書き</div>
        <div class="status-summary-count"><span id="countDraft">0</span>件</div>
        <button type="button" class="btn btn-secondary summary-btn" id="btnToggleDraftList">詳細</button>
      </div>

      <div class="status-summary-card working">
        <div class="status-summary-title">起案中</div>
        <div class="status-summary-count"><span id="countPending">0</span>件</div>
        <button type="button" class="btn btn-secondary summary-btn" id="btnTogglePendingList">詳細</button>
      </div>

      <div class="status-summary-card returned">
        <div class="status-summary-title">差し戻し</div>
        <div class="status-summary-count"><span id="countReturned">0</span>件</div>
        <button type="button" class="btn btn-secondary summary-btn" id="btnToggleReturnedList">詳細</button>
      </div>

      <div class="status-summary-card approved">
        <div class="status-summary-title">承認済</div>
        <div class="status-summary-count"><span id="countApproved">0</span>件</div>
        <button type="button" class="btn btn-secondary summary-btn" id="btnToggleApprovedList">詳細</button>
      </div>
    </div>

    <!-- 一覧 -->
    <div class="draft-list-wrap" id="draftListWrap" style="display:none;">
      <h3>下書き一覧</h3>
      <div id="draftSheetList" class="draftSheetList"></div>
    </div>

    <div class="draft-list-wrap" id="pendingListWrap" style="display:none;">
      <h3>起案中一覧</h3>
      <div id="pendingSheetList" class="draftSheetList"></div>
    </div>

    <div class="draft-list-wrap" id="returnedListWrap" style="display:none;">
      <h3>差し戻し一覧</h3>
      <div id="returnedSheetList" class="draftSheetList"></div>
    </div>

    <div class="draft-list-wrap" id="approvedListWrap" style="display:none;">
      <h3>承認済一覧</h3>
      <div id="approvedSheetList" class="draftSheetList"></div>
    </div>

    <!-- 差し戻しコメント -->
    <div id="returnBox" class="return-box" style="display:none;">
      <h3>差し戻し</h3>
      <div class="return-grid">
        <div class="return-col">
          <div class="return-label">Aからの差し戻し</div>
          <div id="returnCommentA" class="return-comment">なし</div>
        </div>
        <div class="return-col">
          <div class="return-label">Bからの差し戻し</div>
          <div id="returnCommentB" class="return-comment">なし</div>
        </div>
      </div>
    </div>

    <hr class="section-line">

    <!-- 1行目 -->
    <div class="form-row form-row-top">
      <div class="field">
        <label for="type">区分</label>
        <select id="type">
          <option value="">選択してください</option>
          <option value="shishutsu">支出</option>
          <option value="shuunyuu">収入</option>
          <option value="ringi">稟議</option>
        </select>
      </div>

      <div class="field">
        <label for="seiriNo">整理番号</label>
        <input type="text" id="seiriNo" placeholder="例：1">
      </div>

      <div class="field">
        <label for="commonWriter">記載者氏名</label>
        <input type="text" id="commonWriter">
      </div>
    </div>

    <!-- 区分選択後表示 -->
    <div id="afterTypeFields" style="display:none;">
      <!-- 2行目 -->
      <div class="form-row form-row-kms" id="rowKms">
        <div class="field">
          <label for="kou">項</label>
          <input type="text" id="kou">
        </div>

        <div class="field">
          <label for="moku">目</label>
          <input type="text" id="moku">
        </div>

        <div class="field">
          <label for="setsu">節</label>
          <input type="text" id="setsu">
        </div>
      </div>

      <!-- 3行目 -->
      <div class="form-row form-row-title-content">
        <div class="field">
          <label for="commonTitle">件名</label>
          <input type="text" id="commonTitle">
        </div>

        <div class="field">
          <label for="commonContent">内容</label>
          <textarea id="commonContent" rows="8"></textarea>
        </div>
      </div>

      <!-- 4行目 -->
      <div class="form-row form-row-money" id="rowMoney">
        <div class="field">
          <label id="labelAmount" for="moneyAmount">金額</label>
          <input id="moneyAmount" type="number">
        </div>

        <div class="field">
          <label id="labelPartner" for="moneyPartner">支払先</label>
          <input id="moneyPartner" type="text">
        </div>

        <div class="field">
          <label id="labelMethod" for="moneyMethod">方法</label>
          <select id="moneyMethod">
            <option value="口座振込">口座振込</option>
            <option value="現金">現金</option>
          </select>
        </div>

        <div class="field">
          <label id="labelDate" for="moneyDate">年月日</label>
          <input id="moneyDate" type="date">
        </div>
      </div>

      <div class="field note-block">
        <div>※なお、支出の場合</div>
        <div class="indent-note">金額は支払金額、支払先、支払方法、支出年月日</div>
        <div>収入の場合</div>
        <div class="indent-note">金額は収入金額、納入者、納入方法、納入年月日 とする</div>
      </div>

      <!-- hidden互換 -->
      <input type="hidden" id="s_title">
      <input type="hidden" id="s_writer">
      <input type="hidden" id="s_content">
      <input type="hidden" id="r_title">
      <input type="hidden" id="r_writer">
      <input type="hidden" id="r_content">
      <input type="hidden" id="g_title">
      <input type="hidden" id="g_writer">
      <input type="hidden" id="g_content">

      <!-- 添付 -->
      <div id="fileWrap" class="file-field">
        <label for="fileOne">ファイル添付（最大5） / 1件ずつ追加</label>
        <div class="file-row">
          <input id="fileOne" type="file">
          <button id="addFileBtn" type="button" class="addBtn">添付を追加</button>
          <button id="clearFilesBtn" type="button" class="deleteBtn">添付を全削除</button>
        </div>
        <ul id="fileList" class="fileList"></ul>
      </div>

      <!-- 操作 -->
      <div id="actionWrap" class="action-row">
        <button id="sendBtn" type="button">送信</button>
        <button id="clearBtn" type="button" class="secondary">クリア</button>
        <div id="status" class="status"></div>
      </div>
    </div>
  </div>

  <script src="script.js?v=20260308-02"></script>
</body>
</html>
