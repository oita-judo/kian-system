<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>承認済・決定済一覧</title>
  <link rel="stylesheet" href="approved.css">
</head>
<body>
  <div class="auth-topbar">
    <span>ログイン中: <strong id="authUserText"></strong></span>
    <button type="button" id="logoutBtn" onclick="logoutToRoot()">ログアウト　</button>
  </div>

  <div class="container">
    <h1 class="page-title">大分県柔道連盟　承認済のページ</h1>

    <section class="panel">
      <div class="panel-header">
        <h2>承認済を表示</h2>
      </div>
      <div id="msg" class="msg"></div>
      <div id="approvedBeforeWrap" class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>起案日</th>
              <th>区分</th>
              <th>整理番号</th>
              <th>件名</th>
              <th>記載者</th>
              <th>更新日</th>
              <th>決定</th>
            </tr>
          </thead>
          <tbody id="approvedBeforeBody">
            <tr><td colspan="7">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <hr class="section-line">

    <div class="toolbar">
      <div class="filter-buttons">
        <button class="filter-btn active" data-type="">すべて</button>
        <button class="filter-btn" data-type="shuunyuu">収入</button>
        <button class="filter-btn" data-type="shishutsu">支出</button>
        <button class="filter-btn" data-type="ringi">稟議</button>
      </div>

      <div class="sort-area">
        <label for="sortKey">並び替え</label>
        <select id="sortKey">
          <option value="createdAt">起案日</option>
          <option value="updatedAt">更新日</option>
          <option value="seiriNo">整理番号</option>
          <option value="title">件名</option>
        </select>

        <select id="sortDir">
          <option value="desc">降順</option>
          <option value="asc">昇順</option>
        </select>

        <button id="reloadBtn" class="reload-btn" type="button">再読込</button>
      </div>
    </div>

    <section class="panel">
      <div class="panel-header">
        <h2>決定済を表示</h2>
        <div class="panel-note">PDFリンク付き</div>
      </div>

      <div id="doneWrap" class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>起案日</th>
              <th>区分</th>
              <th>整理番号</th>
              <th>件名</th>
              <th>記載者</th>
              <th>決定日</th>
              <th>PDFリンク</th>
            </tr>
          </thead>
          <tbody id="doneBody">
            <tr><td colspan="7">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="done-note">決定済はボタンを押すまで出さない</div>
    </section>
  </div>

  <script src="../auth.js"></script>
  <script src="approved.js"></script>
</body>
</html>
